apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: server2
  name: server2
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server2
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: server2
    spec:
      containers:
        - env:
            - name: SPRING_PROFILES_ACTIVE
              value: kind
            - name: SPIFFE_ENDPOINT_SOCKET
              value: unix:///run/spire/sockets/spire-agent.sock
          image: server2:0.0.1-SNAPSHOT
          name: server2
          ports:
            - containerPort: 8443
          resources: {}
          volumeMounts:
            - name: spire-workload-api
              mountPath: /run/spire/sockets
              readOnly: true
