apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: client3
  name: client3
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client3
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: client3
    spec:
      containers:
        - env:
            - name: SPRING_PROFILES_ACTIVE
              value: kind
            - name: SPIFFE_ENDPOINT_SOCKET
              value: unix:///run/spire/sockets/spire-agent.sock
          image: client3:0.0.1-SNAPSHOT
          name: client3
          ports:
            - containerPort: 8080
          resources: {}
          volumeMounts:
            - name: spire-workload-api
              mountPath: /run/spire/sockets
              readOnly: true
      serviceAccountName: client3
      volumes:
        - name: spire-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
status: {}
