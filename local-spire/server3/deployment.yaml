apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    app: server3
  name: server3
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server3
  strategy: {}
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: server3
    spec:
      containers:
        - env:
            - name: SPRING_PROFILES_ACTIVE
              value: kind
            - name: SPIFFE_ENDPOINT_SOCKET
              value: unix:///run/spire/sockets/spire-agent.sock
          image: server3:0.0.1-SNAPSHOT
          name: server3
          ports:
            - containerPort: 8443
          resources: {}
          volumeMounts:
            - name: spire-workload-api
              mountPath: /run/spire/sockets
              readOnly: true
      serviceAccountName: server3
      volumes:
        - name: spire-workload-api
          csi:
            driver: csi.spiffe.io
            readOnly: true
status: {}
